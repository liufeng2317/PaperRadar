name: Rebuild PaperRadar Pages Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild public JSON and page from committed daily digests
        run: python -m paperradar.cli aggregate-local
      - name: Commit rebuilt page data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/index.html data/daily/public
          git diff --cached --quiet || git commit -m "Rebuild PaperRadar page data"
          git push
